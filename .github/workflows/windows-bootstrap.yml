name: Retired repository guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-tombstones:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify fail-closed shell entry points
        shell: bash
        run: |
          set -u
          probe_home="$RUNNER_TEMP/sub2cli-eol-home"
          mkdir -p "$probe_home"
          for entry in ./install.sh ./desktop/build.sh; do
            set +e
            output=$(HOME="$probe_home" SUB2CLI_INSTALL_DIR="$probe_home/bin" sh "$entry" 2>&1)
            status=$?
            set -e
            test "$status" -eq 64
            grep -F 'sub2cli is retired' <<<"$output"
          done
          test -z "$(find "$probe_home" -mindepth 1 -print -quit)"

      - name: Verify fail-closed Python entry points
        shell: bash
        run: |
          for entry in ./sub2cli ./sub2cli-inject ./desktop/main.py; do
            set +e
            output=$(python3 "$entry" 2>&1)
            status=$?
            set -e
            test "$status" -eq 64
            grep -F 'sub2cli is retired' <<<"$output"
          done

  powershell-tombstone:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify fail-closed PowerShell installer
        shell: pwsh
        run: |
          $probeHome = Join-Path $env:RUNNER_TEMP 'sub2cli-eol-home'
          $env:CODEX_HOME = $probeHome
          $caught = $null
          try {
            & ./install.ps1
          }
          catch {
            $caught = $_.Exception.Message
          }
          if ($caught -notmatch 'sub2cli is retired') {
            throw "unexpected installer result: $caught"
          }
          if (Test-Path $probeHome) {
            throw 'retired installer created profile state'
          }
