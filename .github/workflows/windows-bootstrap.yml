name: Windows bootstrap

on:
  push:
    paths:
      - install.ps1
      - README.md
      - tests/test_install_bootstrap.py
      - .github/workflows/windows-bootstrap.yml
  pull_request:
    paths:
      - install.ps1
      - README.md
      - tests/test_install_bootstrap.py
      - .github/workflows/windows-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fresh-profile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure an isolated fresh profile
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-fresh'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $oldAuth = '{"old":"keep-for-rollback"}' + "`n"
          [IO.File]::WriteAllText(
            (Join-Path $env:CODEX_HOME 'auth.json'),
            $oldAuth,
            [Text.UTF8Encoding]::new($false)
          )
          $env:SUB2CLI_API_URL = 'https://relay.example.test'
          $env:SUB2CLI_API_KEY = 'sk-ci-placeholder'
          $env:SUB2CLI_API_NO_RESTART = '1'

          & ./install.ps1

          $auth = Get-Content (Join-Path $env:CODEX_HOME 'auth.json') -Raw | ConvertFrom-Json
          if ($auth.OPENAI_API_KEY -ne 'sk-ci-placeholder' -or $auth.auth_mode -ne 'apikey') {
            throw 'auth.json does not contain the expected direct API-key mode'
          }
          $config = Get-Content (Join-Path $env:CODEX_HOME 'config.toml') -Raw
          if ($config -notmatch 'base_url = "https://relay\.example\.test/v1"' -or
              $config -notmatch 'requires_openai_auth = true') {
            throw 'config.toml does not contain the expected relay settings'
          }
          $backupAuth = Get-ChildItem (
            Join-Path $env:CODEX_HOME 'provider-switch-backups/*/auth.json'
          )
          if (@($backupAuth).Count -ne 1 -or [IO.File]::ReadAllText($backupAuth[0].FullName) -ne $oldAuth) {
            throw 'existing auth.json was not preserved in the rollback backup'
          }
          if (Get-ChildItem $env:CODEX_HOME -File -Force | Where-Object {
              $_.Name -match '\.(stage|original|rollback)$'
          }) {
            throw 'transaction temporary files remained after fresh bootstrap'
          }

      - name: Refuse to overwrite an existing profile
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-existing'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $sentinel = "mcp_servers.example = { command = 'keep-me' }`n"
          $configPath = Join-Path $env:CODEX_HOME 'config.toml'
          [IO.File]::WriteAllText($configPath, $sentinel, [Text.UTF8Encoding]::new($false))
          $env:SUB2CLI_API_URL = 'https://relay.example.test'
          $env:SUB2CLI_API_KEY = 'sk-ci-placeholder'
          $env:SUB2CLI_API_NO_RESTART = '1'

          $stderrPath = Join-Path $env:RUNNER_TEMP 'expected-bootstrap-refusal.stderr'
          $installer = Start-Process `
            -FilePath (Get-Command pwsh).Source `
            -ArgumentList @('-NoProfile', '-File', (Resolve-Path './install.ps1').Path) `
            -RedirectStandardError $stderrPath `
            -Wait `
            -PassThru
          $installerExit = $installer.ExitCode
          if ($installerExit -eq 0) {
            throw 'installer unexpectedly overwrote an existing profile'
          }
          if ([IO.File]::ReadAllText($configPath) -ne $sentinel) {
            throw 'existing config.toml changed after refused bootstrap'
          }

      - name: Run Windows transaction and race tests
        shell: pwsh
        run: python tests/test_install_bootstrap.py -v -k windows

      - name: Configure a fresh profile with inbox Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSVersion.Major -ne 5) {
            throw "expected Windows PowerShell 5.1, got $($PSVersionTable.PSVersion)"
          }
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-windows-powershell-51'
          $env:SUB2CLI_API_URL = 'https://relay.example.test'
          $env:SUB2CLI_API_KEY = 'sk-ci-placeholder'
          $env:SUB2CLI_API_NO_RESTART = '1'
          try {
            & ([scriptblock]::Create([IO.File]::ReadAllText((Resolve-Path './install.ps1').Path)))
          }
          finally {
            Remove-Item -Path Env:SUB2CLI_API_URL,Env:SUB2CLI_API_KEY -ErrorAction SilentlyContinue
          }
          $auth = Get-Content (Join-Path $env:CODEX_HOME 'auth.json') -Raw | ConvertFrom-Json
          if ($auth.OPENAI_API_KEY -ne 'sk-ci-placeholder' -or $auth.auth_mode -ne 'apikey') {
            throw 'Windows PowerShell 5.1 auth.json verification failed'
          }
          if (Test-Path Env:SUB2CLI_API_KEY) { throw 'PowerShell 5.1 key env remained' }
          if (Get-Command Test-Truthy -ErrorAction SilentlyContinue) {
            throw 'PowerShell 5.1 installer function leaked into caller scope'
          }
          $null = $sub2cliUndefinedAfterWindowsPowerShell51

      - name: Exercise the documented one-line wrapper
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-wrapper'
          $env:SUB2CLI_API_URL = 'https://relay.example.test'
          $env:SUB2CLI_API_KEY = 'sk-ci-placeholder'
          $env:SUB2CLI_API_NO_RESTART = '1'
          $installerUri = 'https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install.ps1'
          try {
            & ([scriptblock]::Create((Invoke-RestMethod $installerUri)))
          }
          finally {
            Remove-Item -Path Env:SUB2CLI_API_URL,Env:SUB2CLI_API_KEY -ErrorAction SilentlyContinue
          }
          if (Test-Path Env:SUB2CLI_API_URL) { throw 'URL remained in the process environment' }
          if (Test-Path Env:SUB2CLI_API_KEY) { throw 'API key remained in the process environment' }
          if (Get-Command Test-Truthy -ErrorAction SilentlyContinue) {
            throw 'installer function leaked into the caller scope'
          }
          if (Get-Variable ApiKey -ErrorAction SilentlyContinue) {
            throw 'installer plaintext variable leaked into the caller scope'
          }
          $null = $sub2cliUndefinedAfterSuccessfulWrapper

      - name: Keep caller alive and clean after wrapper failure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP 'codex-wrapper-failure'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          [IO.File]::WriteAllText(
            (Join-Path $env:CODEX_HOME 'config.toml'),
            "model = 'keep'`n",
            [Text.UTF8Encoding]::new($false)
          )
          $env:SUB2CLI_API_URL = 'https://relay.example.test'
          $env:SUB2CLI_API_KEY = 'sk-ci-placeholder'
          $env:SUB2CLI_API_NO_RESTART = '1'
          $caught = $false
          try {
            & ([scriptblock]::Create([IO.File]::ReadAllText((Resolve-Path './install.ps1').Path)))
          }
          catch {
            $caught = $true
          }
          finally {
            Remove-Item -Path Env:SUB2CLI_API_URL,Env:SUB2CLI_API_KEY -ErrorAction SilentlyContinue
          }
          if (-not $caught) { throw 'failing wrapper did not propagate an error' }
          if (Test-Path Env:SUB2CLI_API_URL) { throw 'URL remained after failed wrapper' }
          if (Test-Path Env:SUB2CLI_API_KEY) { throw 'API key remained after failed wrapper' }
          if (Get-Command Test-Truthy -ErrorAction SilentlyContinue) {
            throw 'installer function leaked after failed wrapper'
          }
          if (Get-Variable ApiKey -ErrorAction SilentlyContinue) {
            throw 'installer plaintext variable leaked after failed wrapper'
          }
          $null = $sub2cliUndefinedAfterFailedWrapper
          Write-Host 'caller remained alive after failed installer'
